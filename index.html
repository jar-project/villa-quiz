<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Villa Quiz Night ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #7C3AED;
      --purple-light: #EDE9FE;
      --purple-mid: #DDD6FE;
      --purple-dark: #5B21B6;
      --text: #1C1C2E;
      --text-muted: #6B7280;
      --bg: #F9F8FF;
      --white: #FFFFFF;
      --border: #E5E7EB;
      --radius: 16px;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* SPLASH */
    #splash {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .splash-badge {
      display: inline-block;
      background: var(--purple-light);
      color: var(--purple);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 1.5rem;
    }

    .splash-title {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .splash-title span { color: var(--purple); }

    .splash-desc {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    /* NAME INPUT */
    .name-select-wrap {
      width: 100%;
      max-width: 400px;
      margin-bottom: 1.5rem;
    }

    .name-select-wrap label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
      text-align: left;
    }

    .member-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .member-pick-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
    }

    .member-pick-btn:hover {
      border-color: var(--purple);
      background: var(--purple-light);
    }

    .member-pick-btn.selected {
      border-color: var(--purple);
      background: var(--purple-light);
      color: var(--purple-dark);
      font-weight: 700;
    }

    .member-pick-btn img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .btn-primary {
      display: block;
      width: 100%;
      max-width: 400px;
      padding: 16px;
      background: var(--purple);
      color: white;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary:hover { background: var(--purple-dark); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: #D1D5DB; cursor: not-allowed; transform: none; }

    /* QUIZ */
    #quiz {
      display: none;
      min-height: 100vh;
      padding: 0;
    }

    .quiz-header {
      position: sticky;
      top: 0;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      z-index: 10;
    }

    .quiz-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .quiz-who {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .quiz-who img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }

    .quiz-counter {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .progress-track {
      height: 5px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--purple);
      border-radius: 100px;
      transition: width 0.4s ease;
    }

    /* QUESTION SCREEN */
    .question-screen {
      display: none;
      flex-direction: column;
      min-height: calc(100vh - 80px);
      padding: 2rem 1.5rem 6rem;
      animation: fadeUp 0.3s ease;
    }

    .question-screen.active {
      display: flex;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .q-title-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--purple-light);
      color: var(--purple);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 100px;
      margin-bottom: 1.25rem;
      width: fit-content;
    }

    .q-text {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 2rem;
    }

    .names-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      overflow-y: auto;
      padding-bottom: 0.5rem;
    }

    .name-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 10px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      transition: all 0.15s;
      text-align: left;
      width: 100%;
    }

    .name-option:hover {
      border-color: var(--purple);
      background: var(--purple-light);
    }

    .name-option.selected {
      border-color: var(--purple);
      background: var(--purple-light);
      color: var(--purple-dark);
      font-weight: 700;
    }

    .name-option img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .name-option .check {
      margin-left: auto;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      color: transparent;
      transition: all 0.15s;
    }

    .name-option.selected .check {
      background: var(--purple);
      border-color: var(--purple);
      color: white;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: none;
    }

    #quiz.active-quiz .bottom-nav { display: block; }

    /* DONE SCREEN */
    #done {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 2rem;
    }

    .done-emoji { font-size: 64px; margin-bottom: 1rem; }
    .done-title { font-size: 28px; font-weight: 800; margin-bottom: 0.5rem; }
    .done-desc { font-size: 15px; color: var(--text-muted); line-height: 1.6; max-width: 280px; }

    /* WAITING INDICATOR */
    .waiting-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--purple);
      border-radius: 50%;
      animation: pulse 1.2s ease infinite;
      margin: 0 3px;
    }
    .waiting-dot:nth-child(2) { animation-delay: 0.2s; }
    .waiting-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.1); }
    }
  </style>
</head>
<body>

<!-- SPLASH / PILIH NAMA -->
<div id="splash">
  <div class="splash-badge">Villa Night ✨</div>
  <h1 class="splash-title">Siapa yang<br><span>"si paling"</span></h1>
  <p class="splash-desc">Voting bareng, biar tau siapa yang "si paling" apa di circle kita enih.</p>

  <div class="name-select-wrap">
    <label>Pilih nama lu dulu 👇</label>
    <div class="member-grid" id="member-grid"></div>
  </div>

  <button class="btn-primary" id="start-btn" disabled onclick="startQuiz()">
    Mulai Voting →
  </button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="quiz-header">
    <div class="quiz-header-top">
      <div class="quiz-who">
        <img id="header-photo" src="" alt="" />
        <span id="header-name"></span>
      </div>
      <div class="quiz-counter" id="q-counter">1 / 45</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="questions-wrap"></div>

  <div class="bottom-nav">
    <button class="btn-primary" id="next-btn" disabled onclick="nextQuestion()">
      Lanjut →
    </button>
  </div>
</div>

<!-- DONE -->
<div id="done" style="display:none">
  <div class="done-emoji">🎉</div>
  <div class="done-title">Selesai!</div>
  <p class="done-desc">Jawaban lu udah masuk. Tunggu semua orang selesai, nanti hasilnya diumumin bareng-bareng ya!</p>
  <br/>
  <div>
    <span class="waiting-dot"></span>
    <span class="waiting-dot"></span>
    <span class="waiting-dot"></span>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ========================
  // GANTI DENGAN CONFIG LO
  // ========================
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window._db = db;
  window._ref = ref;
  window._set = set;
  window._get = get;
  window._onValue = onValue;
</script>

<script src="src/data.js"></script>
<script>
  let currentUser = null;
  let currentQIndex = 0;
  let allQuestions = [];
  let answers = {}; // { questionGlobalIndex: memberName }

  // Flatten semua questions dari semua titles
  function buildAllQuestions() {
    allQuestions = [];
    TITLES.forEach(t => {
      t.questions.forEach(q => {
        allQuestions.push({ titleId: t.id, titleEmoji: t.emoji, titleName: t.title, question: q });
      });
    });
  }

  // Build member grid di splash — render dulu, update status belakangan
  function buildMemberGrid() {
    const grid = document.getElementById('member-grid');
    grid.innerHTML = '';

    // Render semua nama langsung dulu
    MEMBERS.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'member-pick-btn';
      btn.dataset.name = m.name;
      btn.innerHTML = `<img src="${m.photo}" alt="${m.name}" />${m.name}`;
      btn.onclick = () => selectUser(m, btn);
      grid.appendChild(btn);
    });

    // Cek siapa yang udah submit, update UI belakangan
    function tryUpdateSubmitted() {
      if (!window._db) { setTimeout(tryUpdateSubmitted, 300); return; }
      window._get(window._ref(window._db, 'submitted'))
        .then(snap => {
          const data = snap.val() || {};
          const submittedNames = Object.keys(data);
          submittedNames.forEach(name => {
            const btn = grid.querySelector(`[data-name="${name}"]`);
            if (btn) {
              btn.disabled = true;
              btn.style.opacity = '0.4';
              btn.style.cursor = 'not-allowed';
              btn.onclick = null;
              btn.innerHTML = `<img src="${btn.querySelector('img').src}" alt="${name}" />${name} ✓`;
              if (btn.classList.contains('selected')) {
                btn.classList.remove('selected');
                currentUser = null;
                document.getElementById('start-btn').disabled = true;
              }
            }
          });
        })
        .catch(() => {}); // kalau Firebase belum dikonfig, skip aja
    }
    tryUpdateSubmitted();
  }

  function selectUser(member, btn) {
    document.querySelectorAll('.member-pick-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentUser = member;
    document.getElementById('start-btn').disabled = false;
  }

  async function startQuiz() {
    if (!currentUser) return;

    // Double-check: pastiin nama belum submit di Firebase
    if (window._db) {
      try {
        const snap = await window._get(window._ref(window._db, `submitted/${currentUser.name}`));
        if (snap.exists()) {
          showAlreadyDone();
          return;
        }
      } catch(e) { /* lanjut aja kalau gagal cek */ }
    }

    buildAllQuestions();
    document.getElementById('splash').style.display = 'none';
    const quiz = document.getElementById('quiz');
    quiz.style.display = 'block';
    quiz.classList.add('active-quiz');
    document.getElementById('header-photo').src = currentUser.photo;
    document.getElementById('header-name').textContent = currentUser.name;
    buildQuestionScreens();
    showQuestion(0);
  }

  function showAlreadyDone() {
    document.getElementById('splash').style.display = 'none';
    const done = document.getElementById('done');
    done.style.display = 'flex';
    done.querySelector('.done-emoji').textContent = '✅';
    done.querySelector('.done-title').textContent = 'Udah voting!';
    done.querySelector('.done-desc').textContent = 'Lu udah pernah submit sebelumnya. Tunggu semua orang selesai ya, nanti hasilnya diumumin bareng-bareng!';
  }

  function buildQuestionScreens() {
    const wrap = document.getElementById('questions-wrap');
    wrap.innerHTML = '';

    allQuestions.forEach((q, idx) => {
      const screen = document.createElement('div');
      screen.className = 'question-screen';
      screen.id = `qs-${idx}`;

      const nameOptions = MEMBERS
        .filter(m => m.name !== currentUser.name)
        .map(m => `
          <button class="name-option" data-qidx="${idx}" data-name="${m.name}" onclick="selectAnswer(${idx}, '${m.name}', this)">
            <img src="${m.photo}" alt="${m.name}" />
            ${m.name}
            <span class="check">✓</span>
          </button>
        `).join('');

      screen.innerHTML = `
        <div class="q-title-badge">${q.titleEmoji} ${q.titleName}</div>
        <div class="q-text">${q.question}</div>
        <div class="names-list">${nameOptions}</div>
      `;
      wrap.appendChild(screen);
    });
  }

  function showQuestion(idx) {
    document.querySelectorAll('.question-screen').forEach(s => s.classList.remove('active'));
    const screen = document.getElementById(`qs-${idx}`);
    if (screen) screen.classList.add('active');

    currentQIndex = idx;
    const total = allQuestions.length;
    document.getElementById('q-counter').textContent = `${idx + 1} / ${total}`;
    document.getElementById('progress-fill').style.width = `${((idx + 1) / total) * 100}%`;

    const nextBtn = document.getElementById('next-btn');
    nextBtn.disabled = answers[idx] === undefined;

    // Update label tombol
    if (idx === total - 1) {
      nextBtn.textContent = 'Submit ✓';
      nextBtn.onclick = submitAnswers;
    } else {
      nextBtn.textContent = 'Lanjut →';
      nextBtn.onclick = nextQuestion;
    }
  }

  function selectAnswer(qidx, name, btn) {
    document.querySelectorAll(`[data-qidx="${qidx}"]`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    answers[qidx] = name;
    document.getElementById('next-btn').disabled = false;
  }

  function nextQuestion() {
    if (answers[currentQIndex] === undefined) return;
    if (currentQIndex < allQuestions.length - 1) {
      showQuestion(currentQIndex + 1);
    }
  }

  async function submitAnswers() {
    if (!window._db) return;
    const db = window._db;
    const refFn = window._ref;
    const setFn = window._set;

    // Disable tombol submit supaya nggak double-submit
    const nextBtn = document.getElementById('next-btn');
    nextBtn.disabled = true;
    nextBtn.textContent = 'Menyimpan...';

    // Format: votes/{userName}/{titleId}/{questionIdx} = votedForName
    const payload = {};
    allQuestions.forEach((q, idx) => {
      if (answers[idx]) {
        if (!payload[q.titleId]) payload[q.titleId] = {};
        payload[q.titleId][idx] = answers[idx];
      }
    });

    try {
      // Simpan votes
      await setFn(refFn(db, `votes/${currentUser.name}`), payload);
      // Tandain udah submit — ini yang jadi kunci restrict
      await setFn(refFn(db, `submitted/${currentUser.name}`), true);
    } catch(e) {
      console.error("Firebase error:", e);
      nextBtn.disabled = false;
      nextBtn.textContent = 'Submit ✓';
      alert('Gagal nyimpen, coba lagi ya!');
      return;
    }

    // Show done screen
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('quiz').classList.remove('active-quiz');
    const done = document.getElementById('done');
    done.style.display = 'flex';
  }

  // Init
  buildMemberGrid();
</script>
</body>
</html>
